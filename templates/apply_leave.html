<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave - HR ERP</title>

    <link rel="stylesheet" href="/static/css/apply_leave.css">
</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div class="dashboard-sidebar">

        <div class="profile">
            <img src="/static/admin.jpeg" alt="Admin">
            <h2>Admin</h2>
        </div>

        <ul>
            <li><a href="admin_dashboard.html">🏠 Dashboard</a></li>
            <li><a href="/add_employee">➕ Add Employee</a></li>
            <li><a href="/view_employee">👥 View Employees</a></li>
            <li><a href="/search_employee">🔍 Search Employee</a></li>
            <li><a href="/apply_leave">📄 Apply Leave</a></li>
            <li><a href="/logout">🚪 Logout</a></li>
        </ul>

    </div>

    <!-- Main Content -->
    <div class="dashboard-content">

        <h1>Apply Leave</h1>

        <div class="leave-form">

            <form action="/save_leave" method="post">

                <input type="text" name="name" placeholder="Employee Name" required>

                <input type="text" name="reason" placeholder="Reason for Leave" required>

                <button type="submit">Apply Leave</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
